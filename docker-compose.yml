services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-panel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-panel}
      - POSTGRES_DB=${POSTGRES_DB:-panel}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panel} -d ${POSTGRES_DB:-panel}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DATABASE__URL=postgresql+psycopg://${POSTGRES_USER:-panel}:${POSTGRES_PASSWORD:-panel}@db:5432/${POSTGRES_DB:-panel}
      - PANEL__FRONTEND_ORIGIN=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - BACKEND_URL=http://backend:8000
      # serves /api/scan/* from frontend/mock/scanApi.ts fixtures; remove once the backend scan routes land
      - MOCK_API=${MOCK_API:-1}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
